<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ASA Radar | Système de Détection IoT Arduino Temps Réel</title>
    <meta name="description" content="Découvrez le Projet ASA : un radar Arduino innovant avec capteur HC-SR04. Visualisation spatiale IoT en temps réel développée par Aymane, Soufiane et Ali.">
    <meta name="keywords" content="Radar Arduino, Radar ASA, Projet ASA, HC-SR04, IoT, Détection ultrason, Arduino Radar Web">
    
    <link rel="icon" href="logo.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #fdfdfd; 
            --panel: rgba(255, 255, 255, 0.95);
            --panel-border: rgba(0, 85, 255, 0.15);
            --primary: #0055ff; 
            --text: #111; 
            --muted: #4a5a6a; 
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }
        h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: var(--primary); }

        /* BARRE DE NAVIGATION (LOGO ROND + TITRE) */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-height); padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(253, 253, 253, 0.98); border-bottom: 1px solid var(--panel-border); z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-logo-block { display: flex; align-items: center; gap: 12px; }
        .nav-logo { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; } /* Logo rond */
        .nav-title { font-family: 'Orbitron', sans-serif; font-size: 1.15rem; font-weight: 700; color: #000; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 600; text-transform: uppercase; font-family: 'Rajdhani'; }

        /* CONTENU DU SITE */
        section { padding: calc(var(--nav-height) + 40px) 20px 40px; max-width: 1000px; margin: 0 auto; text-align: center; }
        .glass-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 40px; box-shadow: var(--shadow); }
        
        /* LOGO COMPLET DANS LE PROJET */
        .full-logo-img {
            max-width: 250px; 
            height: auto;
            margin-bottom: 25px;
        }

        .btn-launch {
            border: 2px solid var(--primary); padding: 12px 35px; background: #fff; color: var(--primary);
            font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 30px;
        }
        .btn-launch:hover { background: var(--primary); color: #fff; }

        /* MODAL RADAR */
        #radar-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:none; }
        #radar-modal.active { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo-block">
            <img src="logo.png" alt="Icon" class="nav-logo">
            <span class="nav-title">ASA <span class="highlight">RADAR</span></span>
        </div>
        <div class="nav-links">
            <a href="#accueil">Accueil</a>
            <a href="#projet">Projet</a>
        </div>
    </nav>

    <section id="accueil">
        <h1 style="font-size: 2.5rem;">SYSTÈME DE DÉTECTION <span class="highlight">IOT</span></h1>
        <button class="btn-launch" onclick="document.getElementById('radar-modal').classList.add('active')">Lancer le Radar</button>
    </section>

    <section id="projet">
        <div class="glass-card">
            <img src="logo-complet.png" alt="Logo Complet ASA" class="full-logo-img">
            
            <h2>À propos du Projet</h2>
            <p style="margin-top: 20px; line-height: 1.6;">
                Le <strong>Projet ASA</strong> utilise un capteur HC-SR04 et Arduino pour une détection spatiale précise.
                Les données sont envoyées vers <strong>Firebase</strong> pour une visualisation web immédiate.
            </p>
        </div>
    </section>

    <div id="radar-modal">
        <button onclick="this.parentElement.classList.remove('active')" style="position:absolute; top:20px; right:30px; color:white; background:none; border:none; font-size:2rem; cursor:pointer;">✕</button>
        <h2 style="color:white;">Interface Radar en charge...</h2>
    </div>

</body>
</html>
